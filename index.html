<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIXORA Movie App</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body> 

  <!-- HEADER -->
  <header>
    <h1>FIXORA</h1>
    <div class="search-box">
    <input type="text" id="search" placeholder="Search movies...">
    <button>
      <i class="fas fa-search" id="search-btn">

      </i></button>
    </div>
    
  </header>

  <section class="buttons">
    <button onclick="getMovies('popular')"><i class="fas fa-fire"></i> Popular</button>
    <button onclick="getMovies('top_rated')"><i class="fas fa-star"></i> Top Rated</button>
    <button onclick="getMovies('upcoming')"><i class="fas fa-calendar-alt"></i> Upcoming</button>
  </section>

   

  <!-- HERO SECTION -->
  <section class="hero">
    <div class="hero-content">
      <h2>Love Stories That Stay Forever ❤️</h2>
      <p>Discover the best romance movies</p>
    </div>
  </section>

  <!-- GENRE BUTTONS -->
  <section class="genres">
    <button data-genre="28">Action</button>
    <button data-genre="35">Comedy</button>
    <button data-genre="18">Drama</button>
    <button data-genre="10749">Romance</button>
    <button data-genre="27">Horror</button>
    <button data-genre="878">Sci-Fi</button>
  </section>


  <div id="movies" class="movies-container"></div>

 

  <!-- MOVIE CONTAINER -->
  <section id="movies" class="movies-container"></section>

  <script src="script.js"></script>
</body>
</html>
